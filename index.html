<!DOCTYPE html>
<html>
<head>
    <title>DevOps Production Project</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: white;
            width: 450px;
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
        }

        h2 {
            color: #667eea;
        }

        .box {
            margin-top: 25px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 10px;
        }

        .status {
            color: green;
            font-weight: bold;
        }

        footer {
            margin-top: 20px;
            color: gray;
            font-size: 14px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🚀 DevOps Production Project</h1>

    <h2>CI/CD Deployment Demo</h2>

    <div class="box">

        <p>Application Status:</p>

        <p class="status">
            ● Running Successfully
        </p>

        <p>
            Docker + Nginx + AWS EC2
        </p>

    </div>

    <footer>
        Deployed using DevOps Pipeline
    </footer>

</div>

</body>
</html>
